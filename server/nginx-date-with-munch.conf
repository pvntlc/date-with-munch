# 서버 참조용: /etc/nginx/sites-available/date-with-munch 의 실제 적용본.
# (certbot이 SSL 라인을 채운 뒤, 보안 헤더 + 프록시 남용 방지를 추가한 상태)
#
# 함께 필요: /etc/nginx/conf.d/place-proxy-ratelimit.conf
#   limit_req_zone $binary_remote_addr zone=placeproxy:10m rate=3r/s;

server {
    listen 80;
    server_name 168-107-32-252.sslip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 168-107-32-252.sslip.io;

    ssl_certificate /etc/letsencrypt/live/168-107-32-252.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/168-107-32-252.sslip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 보안 헤더
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    root /var/www/date-with-munch;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 장소 검색 프록시: 이 앱 도메인에서 온 요청만 + 속도 제한 (네이버 할당량 남용 방지)
    location /place-proxy/ {
        if ($http_referer !~* ^https://168-107-32-252\.sslip\.io/) { return 403; }
        limit_req zone=placeproxy burst=10 nodelay;
        proxy_pass http://127.0.0.1:8011/;
        proxy_set_header Host $host;
    }
}
